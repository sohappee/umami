name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
      - "feat/**"
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image version (e.g. 3.1.0, v3.1.0)"
        required: false
        default: ""
      include_latest:
        description: "Include latest tag"
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version tags
        id: compute
        run: |
          INPUT="${{ github.event.inputs.version }}"
          REF_TYPE="${{ github.ref_type }}"
          REF_NAME="${{ github.ref_name }}"
          INCLUDE_LATEST="${{ github.event.inputs.include_latest }}"

          if [[ -n "$INPUT" ]]; then
            VERSION="${INPUT#v}"
          elif [[ "$REF_TYPE" == "tag" ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION="dev-$(echo ${{ github.sha }} | cut -c1-7)"
          fi

          TAGS=""

          if [[ -n "$VERSION" ]]; then
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)

            if [[ "$VERSION" == *-* ]]; then
              TAGS="ghcr.io/${{ github.repository }}:$VERSION"
            else
              TAGS="ghcr.io/${{ github.repository }}:$VERSION"
              TAGS="$TAGS,ghcr.io/${{ github.repository }}:${MAJOR}.${MINOR}"
              TAGS="$TAGS,ghcr.io/${{ github.repository }}:${MAJOR}"

              if [[ "$INCLUDE_LATEST" == "true" ]]; then
                TAGS="$TAGS,ghcr.io/${{ github.repository }}:latest"
              fi
            fi
          else
            TAGS="ghcr.io/${{ github.repository }}:${REF_NAME}"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "Computed tags: $TAGS"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.compute.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
